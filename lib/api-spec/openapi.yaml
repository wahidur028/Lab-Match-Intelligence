openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MS/PhD Lab Matcher API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: matcher
    description: Lab matching and resume optimization operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /matcher/analyze:
    post:
      operationId: analyzeMatch
      tags: [matcher]
      summary: Analyze student-lab match
      description: Analyzes a student profile against a target lab and returns match score, gap analysis, and tailored application materials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeMatchRequest"
      responses:
        "200":
          description: Analysis result with match score and application materials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeMatchResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /matcher/scrape-lab:
    post:
      operationId: scrapeLabInfo
      tags: [matcher]
      summary: Scrape lab and professor info from URLs
      description: Fetches Google Scholar and/or lab website pages and uses AI to extract structured professor and research information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScrapeLabRequest"
      responses:
        "200":
          description: Extracted lab information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeLabResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Could not fetch URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /matcher/sessions:
    post:
      operationId: createSession
      tags: [matcher]
      summary: Create a new analysis session
      description: Creates and stores a new lab matching session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listSessions
      tags: [matcher]
      summary: List all sessions
      description: Returns all saved analysis sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /matcher/sessions/{id}:
    get:
      operationId: getSession
      tags: [matcher]
      summary: Get a session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [matcher]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Session deleted
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ScrapeLabRequest:
      type: object
      properties:
        googleScholarUrl:
          type: string
          description: Google Scholar profile URL of the professor
        labWebsiteUrl:
          type: string
          description: Lab or professor website URL
      minProperties: 1

    ScrapeLabResponse:
      type: object
      properties:
        professorName:
          type: string
        university:
          type: string
        department:
          type: string
        researchFocus:
          type: string
          description: AI-generated summary of the professor's research areas
        recentPapers:
          type: string
          description: Formatted list of recent paper titles
        activeKeywords:
          type: array
          items:
            type: string
        hIndex:
          type: integer
          nullable: true
        citationCount:
          type: integer
          nullable: true
        fetchErrors:
          type: array
          items:
            type: string
      required:
        - professorName
        - researchFocus

    AnalyzeMatchRequest:
      type: object
      properties:
        studentProfile:
          $ref: "#/components/schemas/StudentProfile"
        targetLab:
          $ref: "#/components/schemas/TargetLab"
      required:
        - studentProfile
        - targetLab

    StudentProfile:
      type: object
      properties:
        name:
          type: string
          description: Student's full name
        resumeText:
          type: string
          description: Plain text content of student's resume/CV
        linkedinUrl:
          type: string
          description: LinkedIn profile URL
        githubUrl:
          type: string
          description: GitHub profile URL
        scholarUrl:
          type: string
          description: Google Scholar profile URL
        researchInterests:
          type: string
          description: Student's stated research interests and goals
        gpa:
          type: number
          description: Student's GPA
        publicationCount:
          type: integer
          description: Number of publications
        skills:
          type: array
          items:
            type: string
          description: List of technical skills
      required:
        - name
        - resumeText
        - researchInterests

    TargetLab:
      type: object
      properties:
        professorName:
          type: string
          description: Professor's full name
        university:
          type: string
          description: University name
        department:
          type: string
          description: Department name
        labWebsite:
          type: string
          description: Lab or professor's website URL
        recentPapers:
          type: string
          description: Titles or descriptions of recent papers (comma-separated or list)
        researchFocus:
          type: string
          description: General research area/focus of the lab
      required:
        - professorName
        - university
        - department
        - researchFocus

    AnalyzeMatchResponse:
      type: object
      properties:
        matchScore:
          type: integer
          description: Overall match score from 0-100
        synergy:
          $ref: "#/components/schemas/SynergyAnalysis"
        trustAudit:
          $ref: "#/components/schemas/TrustAudit"
        labIntelligence:
          $ref: "#/components/schemas/LabIntelligence"
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"
          description: Actionable recommendations to improve match score
        tailoredResumeBullets:
          type: array
          items:
            type: string
          description: AI-generated resume bullet points tailored to the lab
        emailDraft:
          type: string
          description: AI-drafted first contact email
        strategicAdvice:
          type: string
          description: Strategic advice for the application
      required:
        - matchScore
        - synergy
        - trustAudit
        - labIntelligence
        - recommendations
        - tailoredResumeBullets
        - emailDraft
        - strategicAdvice

    SynergyAnalysis:
      type: object
      properties:
        score:
          type: integer
          description: Research synergy score 0-100
        alignedAreas:
          type: array
          items:
            type: string
          description: Areas where student background aligns with lab research
        gaps:
          type: array
          items:
            type: string
          description: Gaps between student background and lab needs
        techStackMatch:
          type: array
          items:
            type: string
          description: Tech/tools the student has that match the lab
        missingTechStack:
          type: array
          items:
            type: string
          description: Lab's tech stack the student is missing
      required:
        - score
        - alignedAreas
        - gaps
        - techStackMatch
        - missingTechStack

    TrustAudit:
      type: object
      properties:
        overallTrust:
          type: string
          enum: [high, medium, low]
        flags:
          type: array
          items:
            $ref: "#/components/schemas/TrustFlag"
        verifiedClaims:
          type: array
          items:
            type: string
      required:
        - overallTrust
        - flags
        - verifiedClaims

    Recommendation:
      type: object
      properties:
        category:
          type: string
          description: Category of the recommendation (e.g., Skills, Publications, Research Alignment, Trust Signals, GPA, Experience)
        title:
          type: string
          description: Short, action-oriented title for the recommendation
        action:
          type: string
          description: Specific, concrete action the student should take
        impact:
          type: string
          description: Why this action will improve the match score
        effort:
          type: string
          enum: [low, medium, high]
          description: How much effort is required to implement this recommendation
        scoreBoost:
          type: integer
          description: Estimated number of points this recommendation adds to the match score
        projectedScore:
          type: integer
          description: Projected match score if this recommendation is implemented (cumulative)
      required:
        - category
        - title
        - action
        - impact
        - effort
        - scoreBoost
        - projectedScore

    TrustFlag:
      type: object
      properties:
        claim:
          type: string
          description: The claim being evaluated
        status:
          type: string
          enum: [verified, unverified, suspicious]
        reason:
          type: string
          description: Explanation of the flag
      required:
        - claim
        - status
        - reason

    LabIntelligence:
      type: object
      properties:
        activeKeywords:
          type: array
          items:
            type: string
          description: Active research keywords extracted from recent work
        techStack:
          type: array
          items:
            type: string
          description: Technologies and tools used in the lab
        researchTrajectory:
          type: string
          description: Summary of the lab's current research direction
        openProblems:
          type: array
          items:
            type: string
          description: Inferred open problems the lab is working on
      required:
        - activeKeywords
        - techStack
        - researchTrajectory
        - openProblems

    CreateSessionRequest:
      type: object
      properties:
        studentProfile:
          $ref: "#/components/schemas/StudentProfile"
        targetLab:
          $ref: "#/components/schemas/TargetLab"
        analysisResult:
          $ref: "#/components/schemas/AnalyzeMatchResponse"
      required:
        - studentProfile
        - targetLab
        - analysisResult

    Session:
      type: object
      properties:
        id:
          type: integer
        studentName:
          type: string
        professorName:
          type: string
        university:
          type: string
        matchScore:
          type: integer
        studentProfile:
          $ref: "#/components/schemas/StudentProfile"
        targetLab:
          $ref: "#/components/schemas/TargetLab"
        analysisResult:
          $ref: "#/components/schemas/AnalyzeMatchResponse"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentName
        - professorName
        - university
        - matchScore
        - studentProfile
        - targetLab
        - analysisResult
        - createdAt
