kind = "web"
previewPath = "/"
title = "MS/PhD Lab Matcher"
version = "1.0.0"
id = "artifacts/lab-matcher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21977

[services.development]
run = "pnpm --filter @workspace/lab-matcher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lab-matcher", "run", "build" ]
publicDir = "artifacts/lab-matcher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21977"
BASE_PATH = "/"
